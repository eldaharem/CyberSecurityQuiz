<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>情報セキュリティ統一基準ガイドライン クイズ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#92cbd0">
    <link rel="apple-touch-icon" href="icon-192.svg">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>セキュアQ</h1>
        </header>

        <!-- Home Screen -->
        <div id="home-screen" class="screen active">
            <div class="mode-buttons">
                <button id="mode-sequential" class="menu-btn">順番に出題 (最初から)</button>
                <button id="mode-shuffle" class="menu-btn">全問シャッフル</button>
                <button id="mode-random50" class="menu-btn">ランダム50問</button>
                <button id="mode-review" class="menu-btn" disabled>間違えた問題だけ復習</button>
            </div>
            <div class="data-controls">
                <button id="btn-reset-data" class="text-btn">学習データをリセット</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header-controls">
                <button id="btn-back-home" class="icon-btn">◀ ホームに戻る</button>
                <div id="progress" class="progress">問題 - / -</div>
            </div>

            <main id="quiz-container">
                <div id="question-block" class="question-block">
                    <p id="question-text">読み込み中...</p>
                </div>

                <div id="choices-block" class="choices-block">
                    <!-- Choices will be injected here -->
                </div>

                <div id="result-block" class="result-block hidden">
                    <div class="result-header">
                        <span id="correct-answer-label">正解: <span id="correct-answer-number"></span></span>
                        <span id="source-label" class="source-badge">出典: <span id="source-text"></span></span>
                    </div>
                    <div class="explanation-box">
                        <h3>解説</h3>
                        <p id="explanation-text"></p>
                    </div>
                    <button id="next-btn" class="next-btn">次の問題へ</button>
                </div>
            </main>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered.', reg))
                    .catch(err => console.log('Service Worker registration failed.', err));
            });
        }
    </script>
</body>
</html>
